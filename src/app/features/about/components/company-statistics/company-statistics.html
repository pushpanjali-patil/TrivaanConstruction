<section class="company-statistics py-5">

  <div class="container">

    <app-section-title
      subtitle="Our Achievements"
      title="Numbers That Reflect Our Commitment">
    </app-section-title>

    <div class="row g-4">

      @for (stat of stats; track stat.title) {

        <div class="col-lg-3 col-md-6">

          <div class="stat-card">

            <h2>{{ stat.number }}</h2>

            <p>{{ stat.title }}</p>

          </div>

        </div>

      }

    </div>

  </div>

</section>
