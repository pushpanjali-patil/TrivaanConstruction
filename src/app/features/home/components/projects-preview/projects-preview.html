<section class="projects-section" appRevealOnScroll>

    <div class="container">
  <app-section-title
            subtitle="FEATURED PROJECTS"
            title="Building the Future, One Project at a Time"
            description="Explore some of our recent construction and infrastructure projects.">
        </app-section-title>

        <div class="row g-4">

            @for(project of projects(); track project.id){

                <div class="col-lg-4">

                    <div class="project-card">

                        <img
                            [src]="project.image"
                            [alt]="project.title">

                        <div class="project-overlay">

                            <h3>{{project.title}}</h3>

                            <span>{{project.location}}</span>

                            <button class="btn-view">

                                View Details

                            </button>

                        </div>

                    </div>

                </div>

            }

        </div>

    </div>

</section>
