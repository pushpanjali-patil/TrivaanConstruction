<section class="statistics-section">

    <div class="container">

        <div class="row text-center">

            @for(stat of statistics(); track stat.id){

                <div class="col-md-3">

                    <div class="stat-card">

                        <h2>{{stat.value}}</h2>

                        <p>{{stat.title}}</p>

                    </div>

                </div>

            }

        </div>

    </div>

</section>
