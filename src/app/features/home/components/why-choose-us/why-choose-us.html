<section class="why-section" appRevealOnScroll>

    <div class="container">

        <app-section-title
            subtitle="WHY CHOOSE US"
            title="Building Trust Through Quality Construction"
            description="Delivering excellence with experience, modern equipment and a customer-first approach.">
        </app-section-title>

        <div class="row g-4">

            @for(item of items(); track item.id){

                <div class="col-lg-4">

                    <div class="why-card">

                        <div class="icon">

                            {{item.icon}}

                        </div>

                        <h3>

                            {{item.title}}

                        </h3>

                        <p>

                            {{item.description}}

                        </p>

                    </div>

                </div>

            }

        </div>

    </div>

</section>
